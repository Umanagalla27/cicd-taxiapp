---
- hosts: jenkins-master
  become: true
  tasks:

    - name: Ensure apt keyrings directory exists
      file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Add Jenkins GPG key (deprecated method but reliable)
      shell: "curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key | apt-key add -"

    - name: Add Jenkins GPG key 2026 (deprecated method but reliable)
      shell: "curl -fsSL https://pkg.jenkins.io/debian/jenkins.io-2023.key | apt-key add -"

    - name: Add Jenkins apt repository
      shell: "echo 'deb https://pkg.jenkins.io/debian-stable binary/' > /etc/apt/sources.list.d/jenkins.list"

    - name: Update apt cache
      shell: "apt-get update"

    - name: Install Java
      apt:
        name:
          - fontconfig
          - openjdk-17-jdk
        state: present

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present
        update_cache: yes

    - name: Start Jenkins service
      service:
        name: jenkins
        state: started

    - name: Enable Jenkins at boot time
      service:
        name: jenkins
        enabled: yes
