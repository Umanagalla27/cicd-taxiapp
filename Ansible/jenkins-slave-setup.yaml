---
- hosts: jenkins-slave
  become: true
  tasks: 
  - name: update ubuntu repo and cache
    apt:
      update_cache: yes

  - name: install unzip
    apt:
      name:
        - unzip
        - curl
      state: present

  - name: install aws cli
    shell: |
      curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
      unzip -o awscliv2.zip
      sudo ./aws/install --update
      rm -rf awscliv2.zip aws
    args:
      creates: /usr/local/bin/aws

  - name: install java
    apt:
      name: openjdk-17-jdk
      state: present

  - name: download maven packages
    get_url:
      url: https://archive.apache.org/dist/maven/maven-3/3.8.9/binaries/apache-maven-3.8.9-bin.tar.gz
      dest: /tmp/apache-maven-3.8.9-bin.tar.gz

  - name: extract maven packages
    unarchive:
      src: /tmp/apache-maven-3.8.9-bin.tar.gz
      dest: /opt
      remote_src: yes

  - name: install docker
    apt:
      name: docker.io
      state: present

  - name: start docker services
    service:
      name: docker
      state: started

  - name: give 777 permissions on /var/run/docker.sock
    file:
      path: /var/run/docker.sock
      mode: '0777'

  - name: install terraform
    unarchive:
      src: https://releases.hashicorp.com/terraform/1.10.4/terraform_1.10.4_linux_amd64.zip
      dest: /usr/local/bin
      remote_src: yes
      mode: 0755

  - name: install kubectl
    get_url:
      url: "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
      dest: /usr/local/bin/kubectl
      mode: 0755

  - name: install eksctl
    unarchive:
      src: "https://github.com/weaveworks/eksctl/releases/latest/download/eksctl_Linux_amd64.tar.gz"
      dest: /usr/local/bin
      remote_src: yes
      mode: 0755

  - name: install helm
    shell: |
      curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
      chmod 700 get_helm.sh
      ./get_helm.sh
    args:
      creates: /usr/local/bin/helm

  - name: start docker on boot time
    service:
     name: docker
     enabled: yes
